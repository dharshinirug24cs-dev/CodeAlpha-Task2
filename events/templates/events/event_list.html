<!DOCTYPE html>
<html>
<head>
    <title>Event List</title>
</head>
<body>

<h1>Upcoming Events</h1>

{% for event in events %}

<h2>{{ event.title }}</h2>

<p>{{ event.description }}</p>

<p>Date: {{ event.date }}</p>

<p>Venue: {{ event.venue }}</p>

<p>Seats: {{ event.seats }}</p>

<a href="/events/{{ event.id }}/">View Details</a>

<hr>

{% empty %}
<p>No events available.</p>
{% endfor %}

</body>
</html>
